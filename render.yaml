services:
  - type: web
    name: lila-analysis-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn lila_workflow.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LILA_WHISPER_MODEL
        value: tiny.en
      - key: LILA_WHISPER_DEVICE
        value: cpu
      - key: LILA_WHISPER_COMPUTE_TYPE
        value: int8
      - key: LILA_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
